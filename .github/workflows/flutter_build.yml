name: System Keyboard Build

permissions:
  contents: write

on:
  push:
    branches:
      - development
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get


      # 5️⃣ Build release APK
      - name: Build APK
        run: flutter build apk --release

      # 6️⃣ Create GitHub Release
      - name: Create Release & Upload APK
        uses: ncipollo/release-action@v1
        with:
         tag: v${{ github.run_number }}
         name: System Keyboard Release v${{ github.run_number }}
         body: "Automated APK build from GitHub Actions for System Keyboard"
         allowUpdates: true
         artifacts: build/app/outputs/flutter-apk/app-release.apk
         token: ${{ secrets.GITHUB_TOKEN }}


